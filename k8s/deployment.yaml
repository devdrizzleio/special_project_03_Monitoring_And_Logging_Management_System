apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlms-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlms
  template:
    metadata:
      labels:
        app: mlms
    spec:
      containers:
        - name: mlms
          image: mlms:latest
          ports:
            - containerPort: 6000
            - containerPort: 6001
          envFrom:
            - configMapRef:
                name: mlms-config